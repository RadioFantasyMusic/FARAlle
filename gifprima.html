<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>TRILLY</title>
<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    position: relative;
    width: 1308px;
    height: 484px;
  }
   
  /* ===== CONTENITORE VIDEO/GIF ===== */
  .video-wrapper {
    position: absolute;
    width: 270px;
    height: 484px;
    overflow: hidden;
    z-index: 1;
    background: transparent;
    border-radius: 20px;
  }

  /* Posizionamento a sinistra e a destra */
  .left { left: 0; }
  .right { right: 0; }
   
  /* ===== BORDI ARCOBALENO ===== */
  .video-wrapper::before {
    content: "";
    position: absolute;
    inset: 0;
    padding: 4px;
    border-radius: 20px;
    background: conic-gradient(
      red, orange, yellow, lime, cyan, blue, violet, red
    );
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    filter: drop-shadow(0 0 10px rgba(255, 0, 255, .7));
    pointer-events: none;
  }
   
  /* ===== GIF/IMMAGE STYLE ===== */
  .side-gif {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
  }
   
  /* ===== TESTO ARCOBALENO ===== */
  .video-text {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 25px;
    font-family: 'Trebuchet MS', sans-serif;
    font-weight: bold;
    z-index: 2;
    background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
    background-size: 400% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowText 3s linear infinite;
    white-space: nowrap;
  }
   
  @keyframes rainbowText {
    0% { background-position: 0% }
    100% { background-position: 100% }
  }
</style>
</head>
<body>
 
<div class="container">
 
  <div class="video-wrapper left">
    <img src="https://xatimg.com/image/ZQNoaQJmHxNa.gif" class="side-gif" alt="Trilly Left" />
    <div class="video-text">FantasyMusic</div>
  </div>
 
  <div class="video-wrapper right">
    <img src="https://xatimg.com/image/ZQNoaQJmHxNa.gif" alt="Trilly Right" />
    <div class="video-text">FantasyMusic</div>
  </div>

</div>

</body>
</html>
