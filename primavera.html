
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TRILLY EDITION</title>
<style>
  /* TRILLY CSS LOGIC 
  */
  body, html {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    position: relative;
    width: 1350px; 
    height: 520px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px; /* Spazio aumentato per il glow di Trilly */
  }

  .side-gif {
    position: relative;
    width: 290px;
    height: 486px;
    object-fit: cover;
    border-radius: 15px;
    z-index: 1;
    border: 4px solid #fff;
    box-sizing: border-box;
    /* TRILLY ANIMATION ENGINE */
    animation: rainbowGlow 8s infinite linear;
  }

  @keyframes rainbowGlow {
    0% { 
      border-color: #ff0000; 
      box-shadow: 0 0 25px #ff0000, inset 0 0 15px #ff0000; 
    }
    17% { 
      border-color: #ff8800; 
      box-shadow: 0 0 25px #ff8800, inset 0 0 15px #ff8800; 
    }
    33% { 
      border-color: #ffff00; 
      box-shadow: 0 0 25px #ffff00, inset 0 0 15px #ffff00; 
    }
    50% { 
      border-color: #00ff00; 
      box-shadow: 0 0 25px #00ff00, inset 0 0 15px #00ff00; 
    }
    67% { 
      border-color: #0088ff; 
      box-shadow: 0 0 25px #0088ff, inset 0 0 15px #0088ff; 
    }
    83% { 
      border-color: #cc00ff; 
      box-shadow: 0 0 25px #cc00ff, inset 0 0 15px #cc00ff; 
    }
    100% { 
      border-color: #ff0000; 
      box-shadow: 0 0 25px #ff0000, inset 0 0 15px #ff0000; 
    }
  }

  .left-gif {
    margin-left: 15px;
  }

  .right-gif {
    margin-right: 15px;
  }

  img.center-image {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 728px;
    height: 486px;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="container">
  <img src="https://xatimg.com/image/4ov6q8DFdAUD.gif" class="side-gif left-gif" alt="Trilly Left" />

  <img src="https://xatimg.com/image/4ov6q8DFdAUD.gif" class="side-gif right-gif" alt="Trilly Right" />
</div>
</body>
</html>
